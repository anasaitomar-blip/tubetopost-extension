<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TubeToPost</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5h9A2.5 2.5 0 0 1 17 7.5v9A2.5 2.5 0 0 1 14.5 19h-9A2.5 2.5 0 0 1 3 16.5v-9Z" fill="currentColor" opacity="0.9"/>
            <path d="M9 9.5v5l4-2.5-4-2.5Z" fill="#fff"/>
            <path d="M19 8l2-1v10l-2-1V8Z" fill="currentColor" opacity="0.5"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">TubeToPost</span>
          <span class="brand-sub">YouTube → LinkedIn</span>
        </div>
      </div>
      <button id="openOptions" class="icon-btn" title="Réglages" aria-label="Réglages">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
        </svg>
      </button>
    </header>

    <!-- Status pill -->
    <div class="meta-bar">
      <span id="providerPill" class="pill pill-muted">
        <span class="dot"></span><span id="providerLabel">Mode local</span>
      </span>
      <span id="planPill" class="pill pill-muted">Gratuit</span>
    </div>

    <!-- Main -->
    <main class="main">
      <!-- Idle / call to action -->
      <section id="idleView" class="view">
        <p class="lead">Transformez la vidéo YouTube ouverte en un post LinkedIn prêt à publier.</p>
        <button id="generateBtn" class="btn btn-primary btn-block">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3Z"/>
          </svg>
          Générer le post
        </button>
        <p class="hint">Ouvrez d'abord une page <strong>youtube.com/watch</strong>.</p>
      </section>

      <!-- Loading -->
      <section id="loadingView" class="view hidden">
        <div class="spinner" aria-hidden="true"></div>
        <p class="loading-text" id="loadingText">Analyse de la vidéo…</p>
      </section>

      <!-- Result -->
      <section id="resultView" class="view hidden">
        <div class="result-head">
          <span class="result-title" id="resultTitle"></span>
        </div>
        <textarea id="postOutput" class="post-output" spellcheck="false" aria-label="Post généré"></textarea>
        <div class="result-actions">
          <button id="copyBtn" class="btn btn-primary btn-flex">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span id="copyLabel">Copier</span>
          </button>
          <button id="regenBtn" class="btn btn-ghost btn-flex">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>
            </svg>
            Régénérer
          </button>
        </div>
      </section>

      <!-- Error / blocked -->
      <section id="errorView" class="view hidden">
        <div class="alert" id="alertBox">
          <svg class="alert-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <p id="errorMessage"></p>
        </div>
        <button id="retryBtn" class="btn btn-ghost btn-block">Réessayer</button>
        <a id="upgradeLink" href="#" class="upgrade-link hidden">Passer à Pro — 15€/mois →</a>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>100% honnête · sans frais cachés</span>
      <a id="upgradeFooter" href="#" class="footer-link">Pro 15€/mois</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
